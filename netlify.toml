# Netlify config for the Carman Creative portfolio (Next.js 16).
# The @netlify/plugin-nextjs is auto-installed during build — it handles
# routing, Image optimization, server components, and static export hybrid.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Pin Node to current LTS to match local development reliably.
  NODE_VERSION = "22"
  # Disable Next telemetry on build runners.
  NEXT_TELEMETRY_DISABLED = "1"

# Long-cache static assets — images, fonts, JS/CSS chunks.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/work/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — basic hygiene
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
